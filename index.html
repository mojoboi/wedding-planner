              </button>
              
              <button onClick={() => setActiveTab('activity')} className="flex flex-col items-center justify-center w-16 sm:w-20 h-full space-y-1 relative group active:scale-95 transition-transform">
                <div className={`absolute top-0 w-8 sm:w-10 h-1 rounded-b-full transition-all ${activeTab === 'activity' ? 'bg-rose-500' : 'bg-transparent'}`} />
                <IconActivity className={`w-5 h-5 sm:w-5 sm:h-5 transition-colors ${activeTab === 'activity' ? 'text-rose-600 dark:text-rose-400' : 'text-slate-400 dark:text-slate-500 group-hover:text-slate-600 dark:group-hover:text-slate-300'}`} />
                <span className={`text-[9px] sm:text-[10px] font-bold uppercase tracking-wider ${activeTab === 'activity' ? 'text-rose-600 dark:text-rose-400' : 'text-slate-400 dark:text-slate-500'}`}>Activity</span>
              </button>

              <button onClick={() => setActiveTab('dashboard')} className="flex flex-col items-center justify-center w-16 sm:w-20 h-full space-y-1 relative group active:scale-95 transition-transform">
                <div className={`absolute top-0 w-8 sm:w-10 h-1 rounded-b-full transition-all ${activeTab === 'dashboard' ? 'bg-rose-500' : 'bg-transparent'}`} />
                <IconDashboard className={`w-5 h-5 sm:w-5 sm:h-5 transition-colors ${activeTab === 'dashboard' ? 'text-rose-600 dark:text-rose-400' : 'text-slate-400 dark:text-slate-500 group-hover:text-slate-600 dark:group-hover:text-slate-300'}`} />
                <span className={`text-[9px] sm:text-[10px] font-bold uppercase tracking-wider ${activeTab === 'dashboard' ? 'text-rose-600 dark:text-rose-400' : 'text-slate-400 dark:text-slate-500'}`}>Budget</span>
              </button>

              <button onClick={() => setActiveTab('settings')} className="flex flex-col items-center justify-center w-16 sm:w-20 h-full space-y-1 relative group active:scale-95 transition-transform">
                <div className={`absolute top-0 w-8 sm:w-10 h-1 rounded-b-full transition-all ${activeTab === 'settings' ? 'bg-rose-500' : 'bg-transparent'}`} />
                <IconSettings className={`w-5 h-5 sm:w-5 sm:h-5 transition-colors ${activeTab === 'settings' ? 'text-rose-600 dark:text-rose-400' : 'text-slate-400 dark:text-slate-500 group-hover:text-slate-600 dark:group-hover:text-slate-300'}`} />
                <span className={`text-[9px] sm:text-[10px] font-bold uppercase tracking-wider ${activeTab === 'settings' ? 'text-rose-600 dark:text-rose-400' : 'text-slate-400 dark:text-slate-500'}`}>Settings</span>
              </button>
            </div>
          </nav>

          {/* Form Modal */}
          {isModalOpen && (
            <div className="fixed inset-0 bg-slate-900/40 dark:bg-black/60 backdrop-blur-sm z-[50] flex justify-center items-end sm:items-center p-4">
              <div className="bg-white dark:bg-slate-800 w-full sm:max-w-md rounded-[1.5rem] sm:rounded-3xl shadow-2xl overflow-hidden animate-pop-in border border-white dark:border-slate-700 transition-colors duration-300">
                <div className="flex justify-between items-center p-4 sm:p-5 border-b border-slate-100 dark:border-slate-700 bg-slate-50/80 dark:bg-slate-900/50">
                  <h3 className="text-lg sm:text-xl font-black text-slate-800 dark:text-white flex items-center gap-2">
                    {editingId ? <IconEdit className="w-4 h-4 sm:w-5 sm:h-5 text-indigo-400"/> : <IconPlus className="w-4 h-4 sm:w-5 sm:h-5 text-rose-400"/>} 
                    {editingId ? 'Edit' : 'Add'} {modalType === 'day' ? 'Day' : 'Event'}
                  </h3>
                  <button onClick={() => setIsModalOpen(false)} className="p-1.5 sm:p-2 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-600 text-slate-400 dark:text-slate-400 hover:text-slate-700 dark:hover:text-slate-200 hover:bg-slate-50 dark:hover:bg-slate-700 rounded-full transition-all active:scale-90">
                    <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="3"><path strokeLinecap="round" strokeLinejoin="round" d="M6 18L18 6M6 6l12 12"></path></svg>
                  </button>
                </div>
                
                <form onSubmit={handleSubmit} className="p-4 sm:p-5 space-y-4 sm:space-y-5 max-h-[75vh] overflow-y-auto pb-safe">
                  <div>
                    <label className="block text-xs sm:text-sm font-bold text-slate-700 dark:text-slate-300 mb-1.5 sm:mb-2">Title</label>
                    <input type="text" required autoFocus value={formData.title} onChange={e => setFormData({...formData, title: e.target.value})} className="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 px-3 py-3 sm:px-4 sm:py-3.5 rounded-lg sm:rounded-xl focus:outline-none focus:ring-2 focus:ring-rose-200 dark:focus:ring-rose-500/30 focus:bg-white dark:focus:bg-slate-800 transition-all font-bold text-sm sm:text-base dark:text-white" placeholder={modalType === 'day' ? 'e.g. Wedding Day' : 'e.g. Photographer Deposit'} />
                  </div>

                  {modalType === 'day' && (
                    <>
                      <div>
                        <label className="block text-xs sm:text-sm font-bold text-slate-700 dark:text-slate-300 mb-1.5 sm:mb-2">Date</label>
                        <input type="date" value={formData.date} onChange={e => setFormData({...formData, date: e.target.value})} className="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 px-3 py-3 sm:px-4 sm:py-3.5 rounded-lg sm:rounded-xl focus:outline-none focus:ring-2 focus:ring-rose-200 dark:focus:ring-rose-500/30 focus:bg-white dark:focus:bg-slate-800 transition-all font-bold text-sm sm:text-base text-slate-700 dark:text-slate-200" />
                      </div>
                      <div>
                        <label className="block text-xs sm:text-sm font-bold text-slate-700 dark:text-slate-300 mb-2 sm:mb-3">Day Color Theme</label>
                        <div className="grid grid-cols-6 gap-2 sm:gap-3 bg-slate-50 dark:bg-slate-900 p-2 sm:p-3 rounded-lg sm:rounded-xl border border-slate-100 dark:border-slate-700">
                          {PASTEL_COLORS.map(color => {
                            const bubbleBg = color.bg.split(' ')[0];
                            return (
                              <button key={color.id} type="button" onClick={() => setFormData({...formData, color: color.bg})} className={`w-8 h-8 sm:w-10 sm:h-10 rounded-full mx-auto transition-all duration-300 active:scale-90 flex items-center justify-center ${bubbleBg} ${formData.color === color.bg ? `ring-2 ring-offset-2 ring-slate-400 dark:ring-offset-slate-800 scale-110 shadow-md border-white/50` : 'border border-black/5 hover:scale-105'}`}>
                                {formData.color === color.bg && <IconCheck className="w-3 h-3 sm:w-4 sm:h-4 text-slate-800/60" />}
                              </button>
                            );
                          })}
                        </div>
                      </div>
                    </>
                  )}

                  {modalType === 'event' && (
                    <>
                      <div className="bg-slate-50 dark:bg-slate-900/50 p-3 sm:p-4 rounded-xl sm:rounded-2xl border border-slate-100 dark:border-slate-700">
                        <label className="block text-xs sm:text-sm font-bold text-slate-700 dark:text-slate-300 mb-2 sm:mb-3">Responsible Side <span className="text-rose-500">*</span></label>
                        <div className="flex flex-col sm:flex-row gap-2 sm:gap-3">
                          <label className={`flex-1 flex items-center justify-center gap-1.5 sm:gap-2 p-2.5 sm:p-3 border-2 rounded-lg sm:rounded-xl cursor-pointer transition-all active:scale-95 ${formData.side === 'Bride' ? 'bg-rose-50 dark:bg-rose-500/20 border-rose-400 dark:border-rose-500 text-rose-700 dark:text-rose-300 shadow-sm' : 'bg-white dark:bg-slate-800 border-slate-200 dark:border-slate-600 text-slate-400 dark:text-slate-500'}`}>
                            <input type="radio" name="side" value="Bride" required checked={formData.side === 'Bride'} onChange={e => setFormData({...formData, side: e.target.value})} className="hidden" />
                            <IconHeart className="w-3.5 h-3.5 sm:w-4 sm:h-4" /> <span className="font-bold text-sm sm:text-base">Bride</span>
                          </label>
                          <label className={`flex-1 flex items-center justify-center gap-1.5 sm:gap-2 p-2.5 sm:p-3 border-2 rounded-lg sm:rounded-xl cursor-pointer transition-all active:scale-95 ${formData.side === 'Groom' ? 'bg-indigo-50 dark:bg-indigo-500/20 border-indigo-400 dark:border-indigo-500 text-indigo-700 dark:text-indigo-300 shadow-sm' : 'bg-white dark:bg-slate-800 border-slate-200 dark:border-slate-600 text-slate-400 dark:text-slate-500'}`}>
                            <input type="radio" name="side" value="Groom" required checked={formData.side === 'Groom'} onChange={e => setFormData({...formData, side: e.target.value})} className="hidden" />
                            <IconUser className="w-3.5 h-3.5 sm:w-4 sm:h-4" /> <span className="font-bold text-sm sm:text-base">Groom</span>
                          </label>
                          <label className={`flex-1 flex items-center justify-center gap-1.5 sm:gap-2 p-2.5 sm:p-3 border-2 rounded-lg sm:rounded-xl cursor-pointer transition-all active:scale-95 ${formData.side === 'Combined' ? 'bg-purple-50 dark:bg-purple-500/20 border-purple-400 dark:border-purple-500 text-purple-700 dark:text-purple-300 shadow-sm' : 'bg-white dark:bg-slate-800 border-slate-200 dark:border-slate-600 text-slate-400 dark:text-slate-500'}`}>
                            <input type="radio" name="side" value="Combined" required checked={formData.side === 'Combined'} onChange={e => setFormData({...formData, side: e.target.value})} className="hidden" />
                            <IconUsers className="w-3.5 h-3.5 sm:w-4 sm:h-4" /> <span className="font-bold text-sm sm:text-base">Combined</span>
                          </label>
                        </div>
                      </div>

                      <div className="flex gap-3 sm:gap-4">
                        <div className="flex-1">
                          <label className="block text-xs sm:text-sm font-bold text-slate-700 dark:text-slate-300 mb-1.5 sm:mb-2">Expected ({settings.currency})</label>
                          <input type="number" step="0.01" min="0" required value={formData.expectedCost} onChange={e => setFormData({...formData, expectedCost: e.target.value})} className="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 px-3 py-3 sm:px-4 sm:py-3.5 rounded-lg sm:rounded-xl focus:outline-none focus:ring-2 focus:ring-rose-200 dark:focus:ring-rose-500/30 focus:bg-white dark:focus:bg-slate-800 transition-all font-bold text-sm sm:text-base dark:text-white" placeholder="0.00" />
                        </div>
                        <div className="flex-1">
                          <label className="block text-xs sm:text-sm font-bold text-slate-700 dark:text-slate-300 mb-1.5 sm:mb-2">Actual ({settings.currency})</label>
                          <input type="number" step="0.01" min="0" value={formData.actualCost} onChange={e => setFormData({...formData, actualCost: e.target.value})} className="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 px-3 py-3 sm:px-4 sm:py-3.5 rounded-lg sm:rounded-xl focus:outline-none focus:ring-2 focus:ring-rose-200 dark:focus:ring-rose-500/30 focus:bg-white dark:focus:bg-slate-800 transition-all font-bold text-sm sm:text-base dark:text-white" placeholder="0.00" />
                        </div>
                      </div>
                      
                      <div className={`flex flex-col gap-2 sm:gap-3 p-3 sm:p-4 rounded-xl sm:rounded-2xl border transition-colors duration-300 ${formData.paid ? 'bg-emerald-50/70 dark:bg-emerald-900/30 border-emerald-200 dark:border-emerald-700' : 'bg-slate-50 dark:bg-slate-900 border-slate-100 dark:border-slate-700'}`}>
                        <label className="flex items-center gap-2 sm:gap-3 cursor-pointer group w-fit">
                          <div className={`w-5 h-5 sm:w-6 sm:h-6 rounded flex items-center justify-center transition-all duration-300 ${formData.paid ? 'bg-emerald-500 text-white scale-110 shadow-lg shadow-emerald-200/50 dark:shadow-none' : 'bg-white dark:bg-slate-800 border-2 border-slate-300 dark:border-slate-600'}`}>
                            {formData.paid && <IconCheck className="w-3 h-3 sm:w-4 sm:h-4 animate-[popIn_0.2s_ease-out]" />}
                          </div>
                          <input 
                            type="checkbox" 
                            className="hidden" 
                            checked={formData.paid} 
                            onChange={e => {
                              const isPaid = e.target.checked;
                              const currentPayers = Array.isArray(formData.paidBy) ? formData.paidBy : [];
                              setFormData({
                                ...formData, 
                                paid: isPaid, 
                                paidBy: isPaid ? (currentPayers.length > 0 ? currentPayers : [currentUser.name]) : []
                              });
                            }} 
                          />
                          <span className={`text-xs sm:text-sm font-black transition-colors ${formData.paid ? 'text-emerald-700 dark:text-emerald-400' : 'text-slate-700 dark:text-slate-300'}`}>Mark as Paid</span>
                        </label>
                        
                        {formData.paid && (
                          <div className="pl-7 sm:pl-9 animate-pop-in mt-1">
                            <label className="block text-[10px] sm:text-xs font-bold text-emerald-600/80 dark:text-emerald-400 mb-2 uppercase tracking-wide">Who paid this?</label>
                            <div className="flex flex-wrap gap-2 sm:gap-3">
                              {usersList.map(u => {
                                if (!u) return null;
                                const currentPayers = Array.isArray(formData.paidBy) ? formData.paidBy : [];
                                const isSelected = currentPayers.includes(u.name);
                                return (
                                  <button
                                    key={u.id}
                                    type="button"
                                    onClick={() => {
                                      setFormData({
                                        ...formData,
                                        paidBy: isSelected ? currentPayers.filter(name => name !== u.name) : [...currentPayers, u.name]
                                      });
                                    }}
                                    className={`flex items-center gap-1.5 sm:gap-2 p-1.5 sm:p-2 rounded-lg sm:rounded-xl border transition-all active:scale-95 ${
                                      isSelected
                                        ? 'bg-emerald-50 dark:bg-emerald-500/20 border-emerald-400 dark:border-emerald-500 text-emerald-700 dark:text-emerald-300 shadow-sm'
                                        : 'bg-white dark:bg-slate-800 border-slate-200 dark:border-slate-600 text-slate-400 dark:text-slate-500 hover:border-emerald-200 dark:hover:border-emerald-700'
                                    }`}
                                  >
                                    <div className={`w-5 h-5 sm:w-6 sm:h-6 rounded-full font-bold flex items-center justify-center text-[10px] sm:text-xs shrink-0 transition-colors ${
                                      isSelected
                                        ? 'bg-emerald-500 text-white'
                                        : 'bg-slate-100 dark:bg-slate-700 text-slate-500 dark:text-slate-400'
                                    }`}>
                                      {getInitials(u.name)}
                                    </div>
                                    <span className="font-bold text-xs sm:text-sm pr-1">{u.name}</span>
                                  </button>
                                );
                              })}
                            </div>
                          </div>
                        )}
                      </div>

                      <div className="grid grid-cols-2 gap-3 sm:gap-4">
                        <div className="col-span-2">
                          <label className="block text-xs sm:text-sm font-bold text-slate-700 dark:text-slate-300 mb-1.5 sm:mb-2">Vendor</label>
                          <input type="text" value={formData.vendor} onChange={e => setFormData({...formData, vendor: e.target.value})} className="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 px-3 py-3 sm:px-4 sm:py-3.5 rounded-lg sm:rounded-xl focus:outline-none focus:ring-2 focus:ring-rose-200 dark:focus:ring-rose-500/30 focus:bg-white dark:focus:bg-slate-800 transition-all font-bold text-sm sm:text-base dark:text-white" placeholder="e.g. Dream Photography" />
                        </div>
                      </div>
                      <div>
                        <label className="block text-xs sm:text-sm font-bold text-slate-700 dark:text-slate-300 mb-1.5 sm:mb-2">Notes</label>
                        <textarea rows="2" value={formData.notes} onChange={e => setFormData({...formData, notes: e.target.value})} className="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 px-3 py-3 sm:px-4 sm:py-3.5 rounded-lg sm:rounded-xl focus:outline-none focus:ring-2 focus:ring-rose-200 dark:focus:ring-rose-500/30 focus:bg-white dark:focus:bg-slate-800 transition-all font-bold text-sm sm:text-base resize-none dark:text-white" placeholder="Details, links, reminders..."></textarea>
                      </div>
                    </>
                  )}

                  <div className="pt-1 sm:pt-2">
                    <button type="submit" className="w-full bg-slate-800 dark:bg-slate-100 hover:bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold py-3 sm:py-4 rounded-lg sm:rounded-xl transition-all shadow-lg active:scale-95 flex items-center justify-center gap-2 text-base sm:text-lg">
                      Save {modalType === 'day' ? 'Day' : 'Event'}
                    </button>
                  </div>
                </form>
              </div>
            </div>
          )}

          {/* Delete / Clear Confirmation Modal */}
          {confirmDialog.isOpen && (
            <div className="fixed inset-0 bg-slate-900/40 dark:bg-black/60 backdrop-blur-sm z-[60] flex justify-center items-center p-4">
              <div className="bg-white dark:bg-slate-800 w-full max-w-xs sm:max-w-sm rounded-[1.5rem] sm:rounded-[2rem] shadow-2xl overflow-hidden p-5 sm:p-6 text-center animate-pop-in border border-white dark:border-slate-700">
                <div className="w-12 h-12 sm:w-16 sm:h-16 bg-rose-50 dark:bg-rose-500/20 text-rose-500 dark:text-rose-400 rounded-xl sm:rounded-2xl flex items-center justify-center mx-auto mb-3 sm:mb-4 rotate-12">
                  <IconAlertTriangle className="w-6 h-6 sm:w-8 sm:h-8" />
                </div>
                <h3 className="text-lg sm:text-xl font-black text-slate-800 dark:text-white mb-2">
                  {confirmDialog.type === 'clear_activity' ? 'Clear History?' : `Delete ${confirmDialog.type.charAt(0).toUpperCase() + confirmDialog.type.slice(1)}?`}
                </h3>
                <p className="text-slate-500 dark:text-slate-400 text-xs sm:text-sm mb-5 sm:mb-6 font-medium">
                  {confirmDialog.type === 'day' ? "This will delete the day and all events inside it. This action cannot be undone." : 
                   confirmDialog.type === 'profile' ? "This will remove the user profile permanently. This action cannot be undone." :
                   confirmDialog.type === 'clear_activity' ? "This will permanently delete all recorded activity. This action cannot be undone." :
                   "This will delete the event permanently. This action cannot be undone."}
                </p>
                <div className="flex gap-2 sm:gap-3">
                  <button onClick={() => setConfirmDialog({ isOpen: false, type: '', targetId: null, parentId: null, itemTitle: '' })} className="flex-1 py-2.5 sm:py-3 bg-slate-100 dark:bg-slate-700 hover:bg-slate-200 dark:hover:bg-slate-600 text-slate-600 dark:text-slate-300 font-bold text-sm sm:text-base rounded-lg sm:rounded-xl transition-all active:scale-95">
                    Cancel
                  </button>
                  <button onClick={executeDelete} className="flex-1 py-2.5 sm:py-3 bg-rose-500 hover:bg-rose-600 text-white font-bold text-sm sm:text-base rounded-lg sm:rounded-xl transition-all shadow-md shadow-rose-200 dark:shadow-none active:scale-95">
                    {confirmDialog.type === 'clear_activity' ? 'Clear All' : 'Delete'}
                  </button>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
