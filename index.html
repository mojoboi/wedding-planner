    tailwind.config = {
      darkMode: 'class',

        extend: {
          fontFamily: {

            soft: '0 10px 30px -15px rgba(15, 23, 42, 0.18)',

  <!-- Custom CSS Animations & App Layouts -->
  <style>
    /* Smooth transition for the root font size */
    html { transition: font-size 0.3s ease; }
    html, body, #root { height: 100%; margin: 0; }
    
    @keyframes popIn { 0% { transform: scale(0.95); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    @keyframes pulse-soft { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.8; transform: scale(1.05); } }
    @keyframes shimmer { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
    
    .animate-pop-in { animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    .animate-pulse-soft { animation: pulse-soft 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    .shimmer { animation: shimmer 2s infinite; }
    
    /* Clean Custom Scrollbar for Event Lists */
    .custom-scrollbar::-webkit-scrollbar { width: 4px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(148, 163, 184, 0.3); border-radius: 4px; }
    .dark .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(148, 163, 184, 0.2); }
    
    /* Hide scrollbar for main window */
    ::-webkit-scrollbar { width: 0px; background: transparent; }

    /* Floating Background Icons Animation */
    .floating-bg {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      overflow: hidden; z-index: 0; pointer-events: none;
    }
    .floating-bg div {
      position: absolute; opacity: 0.15;
      animation: floatUp linear infinite; bottom: -20%;
    }
    @keyframes floatUp {
      0% { transform: translateY(0) rotate(0deg); opacity: 0; }
      10% { opacity: 0.15; }
      90% { opacity: 0.15; }
      100% { transform: translateY(-120vh) rotate(360deg); opacity: 0; }
    }
    .floating-bg div:nth-child(1) { left: 10%; animation-duration: 15s; animation-delay: 0s; }
    .floating-bg div:nth-child(2) { left: 25%; animation-duration: 12s; animation-delay: 2s; }
    .floating-bg div:nth-child(3) { left: 40%; animation-duration: 18s; animation-delay: 4s; }
    .floating-bg div:nth-child(4) { left: 60%; animation-duration: 14s; animation-delay: 1s; }
    .floating-bg div:nth-child(5) { left: 75%; animation-duration: 16s; animation-delay: 5s; }
    .floating-bg div:nth-child(6) { left: 85%; animation-duration: 13s; animation-delay: 3s; }
    .floating-bg div:nth-child(7) { left: 50%; animation-duration: 17s; animation-delay: 6s; }
    .floating-bg div:nth-child(8) { left: 15%; animation-duration: 14s; animation-delay: 7s; }

    /* Mobile Positioning Adjustments */
    @media (max-width: 640px) {
      .mobile-fab-nudge {
        bottom: 5.5rem !important; /* Default mobile gap above nav bar */
      }
    }

    /* Standalone App Adjustments (Added to Home Screen) */
    @media (display-mode: standalone), (display-mode: fullscreen) {
      .standalone-nav {
        /* Applies safe-area padding at bottom ONLY when installed to home screen */
        padding-bottom: env(safe-area-inset-bottom, 20px) !important;
      }
      .mobile-fab-nudge {
        /* Bumps the FAB button to account for the safe area padding */
        bottom: calc(5.5rem + env(safe-area-inset-bottom, 20px)) !important;
      }
    }
  </style>
</head>

    // --- Utility Functions ---
    const generateId = () => Math.random().toString(36).substr(2, 9);
    
    const formatDateDisplay = (dateString) => {
      if (!dateString) return 'No Date Set';
      const parts = dateString.split('-');
      if (parts.length !== 3) return dateString;
      const year = parts[0];
      const monthIdx = parseInt(parts[1], 10) - 1;
      const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
      return `${year} ${months[monthIdx]} ${parts[2]}`;
    };

    const formatTimeAgo = (timestamp) => {
      const diff = Date.now() - timestamp;
      const mins = Math.floor(diff / 60000);
      if (mins < 1) return 'Just now';
      if (mins < 60) return `${mins}m ago`;
      const hours = Math.floor(mins / 60);
      if (hours < 24) return `${hours}h ago`;
      const days = Math.floor(hours / 24);
      return `${days}d ago`;
    };

    const getCostColorClass = (actual, expected) => {
      if (actual < expected) return 'text-emerald-600 dark:text-emerald-400';
      if (actual > expected) return 'text-rose-600 dark:text-rose-400';
      return 'text-slate-900 dark:text-slate-100';

      { id: 'lilac', bg: 'bg-purple-100 dark:bg-purple-500/20', border: 'border-purple-200 dark:border-purple-500/30' },
      { id: 'lemon', bg: 'bg-amber-100 dark:bg-amber-500/20', border: 'border-amber-200 dark:border-amber-500/30' },
      { id: 'rose', bg: 'bg-rose-100 dark:bg-rose-500/20', border: 'border-rose-200 dark:border-rose-500/30' },
      { id: 'indigo', bg: 'bg-indigo-100 dark:bg-indigo-500/20', border: 'border-indigo-200 dark:border-indigo-500/30' },
      { id: 'teal', bg: 'bg-teal-100 dark:bg-teal-500/20', border: 'border-teal-200 dark:border-teal-500/30' },
      { id: 'yellow', bg: 'bg-yellow-100 dark:bg-yellow-500/20', border: 'border-yellow-200 dark:border-yellow-500/30' },
      { id: 'pink', bg: 'bg-pink-100 dark:bg-pink-500/20', border: 'border-pink-200 dark:border-pink-500/30' },
      { id: 'slate', bg: 'bg-slate-200 dark:bg-slate-500/20', border: 'border-slate-300 dark:border-slate-500/30' }
    ];

    function App() {
      // --- Firebase Init State ---
      const [firebaseReady, setFirebaseReady] = useState(false);

      // --- Local User Auth & Settings (Stored locally) ---
      const [currentUser, setCurrentUser] = useState(() => {
        try { 
          return JSON.parse(localStorage.getItem('weddingApp_user')) || 
                 JSON.parse(sessionStorage.getItem('weddingApp_user')) || null; 
        } catch { return null; }
      });
      
      const [settings, setSettings] = useState(() => {
        try { 
          const saved = JSON.parse(localStorage.getItem('weddingApp_localSettings'));
          return saved || { currency: 'INR', exchangeRate: 68, theme: 'light', layoutSize: 'small' };
        } catch { 
          return { currency: 'INR', exchangeRate: 68, theme: 'light', layoutSize: 'small' }; 
        }
      });

      const [welcomeName, setWelcomeName] = useState('');
      const [welcomeError, setWelcomeError] = useState('');
      const [rememberMe, setRememberMe] = useState(true);
      
      // Admin Password Prompt State
      const [authPrompt, setAuthPrompt] = useState({ isOpen: false, userObj: null, pass: '', error: '' });

      // --- App State ---
      const [usersList, setUsersList] = useState([]);
      const [days, setDays] = useState([]);
      const [activities, setActivities] = useState([]);
      const [activeTab, setActiveTab] = useState('board');
      const [collapsedDays, setCollapsedDays] = useState({});
      const [collapsedEvents, setCollapsedEvents] = useState({});

      // Modal States
      const [isModalOpen, setIsModalOpen] = useState(false);
      const [modalType, setModalType] = useState('day');
      const [editingId, setEditingId] = useState(null);
      const [parentId, setParentId] = useState(null);
      const [confirmDialog, setConfirmDialog] = useState({ isOpen: false, type: '', targetId: null, parentId: null, itemTitle: '' });

      const [formData, setFormData] = useState({
        title: '', date: '', expectedCost: '', actualCost: '', paid: false, vendor: '', notes: '', side: '', paidBy: [], color: PASTEL_COLORS[0].bg
      });

      // --- 1. Wait for Firebase Module to Load ---
      useEffect(() => {
        const checkFirebase = setInterval(() => {
          if (window.fs && window.db) {
            setFirebaseReady(true);
            clearInterval(checkFirebase);
          }
        }, 100);
        return () => clearInterval(checkFirebase);
      }, []);

      // --- 2. Connect to Firebase (Realtime Listeners) ---
      useEffect(() => {
        if (!firebaseReady) return;

        const unsubDays = window.fs.onSnapshot(window.fs.collection(window.db, 'days'), (snapshot) => {
          const fetchedDays = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
          fetchedDays.sort((a, b) => (a.order || 0) - (b.order || 0));
          setDays(fetchedDays);
        });

        const unsubUsers = window.fs.onSnapshot(window.fs.collection(window.db, 'users'), (snapshot) => {
          setUsersList(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
        });

        const unsubActivities = window.fs.onSnapshot(window.fs.collection(window.db, 'activities'), (snapshot) => {
          const fetchedActs = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
          fetchedActs.sort((a, b) => b.timestamp - a.timestamp);
          setActivities(fetchedActs);
        });

        return () => { unsubDays(); unsubUsers(); unsubActivities(); };
      }, [firebaseReady]);

      // --- 3. Local Effects ---
      useEffect(() => { localStorage.setItem('weddingApp_localSettings', JSON.stringify(settings)); }, [settings]);

      // Keep the current user in sync if an Admin modifies their status
      useEffect(() => {
        if (currentUser) {
          const updatedMe = usersList.find(u => u && u.id === currentUser.id);
          if (updatedMe && updatedMe.isAdmin !== currentUser.isAdmin) {
            persistUser(updatedMe);
          }
        }
      }, [usersList]);

      // Handle Theme & Layout Scaling locally
      useEffect(() => {
        if (settings.theme === 'dark') {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }

        // Dynamically scale the root font size based on the layoutSize setting.
        if (settings.layoutSize === 'medium') {
          document.documentElement.style.fontSize = '18px';
        } else if (settings.layoutSize === 'large') {
          document.documentElement.style.fontSize = '20px';
        } else {
          document.documentElement.style.fontSize = '16px'; // Default (Small)
        }
      }, [settings.theme, settings.layoutSize]);

      // --- Computed Data ---
      const stats = useMemo(() => {
        let totalExpected = 0, totalActual = 0, paid = 0;
        let brideExpected = 0, brideActual = 0, groomExpected = 0, groomActual = 0, combinedExpected = 0, combinedActual = 0;
        const contributions = {};

        days.forEach(day => {
          (day.events || []).forEach(ev => {
            if (!ev) return;
            const exp = parseFloat(ev.expectedCost ?? ev.cost) || 0;
            const act = parseFloat(ev.actualCost) || 0;

            totalExpected += exp; totalActual += act;

            if (ev.paid) {
              paid += act;
              if (ev.paidBy) {
                let payers = [];
                if (Array.isArray(ev.paidBy)) payers = ev.paidBy;
                else if (typeof ev.paidBy === 'string') payers = ev.paidBy.split(',').map(s => s.trim()).filter(Boolean);
                
                if (payers.length > 0) {
                  const splitAmount = act / payers.length;
                  payers.forEach(payer => {
                    contributions[payer] = (contributions[payer] || 0) + splitAmount;
                  });
                }
              }
            }

            if (ev.side === 'Bride') { brideExpected += exp; brideActual += act; } 
            else if (ev.side === 'Groom') { groomExpected += exp; groomActual += act; }
            else if (ev.side === 'Combined') { combinedExpected += exp; combinedActual += act; }
          });
        });

        return {
          totalExpected, totalActual, paid, remaining: totalExpected - paid,
          brideExpected, brideActual, groomExpected, groomActual, combinedExpected, combinedActual, contributions
        };
      }, [days]);

      // --- Activity Logger ---
      const logActivity = async (action, details) => {
        if (!currentUser) return;
        try {
          await window.fs.addDoc(window.fs.collection(window.db, 'activities'), {
            userName: currentUser.name,
            action,
            details,
            timestamp: Date.now()
          });
        } catch(err) { console.error("Failed to log activity", err); }
      };

      // --- Auth Actions ---
      const persistUser = (userObj) => {
        setCurrentUser(userObj);
        if (rememberMe) {
          localStorage.setItem('weddingApp_user', JSON.stringify(userObj));
          sessionStorage.removeItem('weddingApp_user');
        } else {
          sessionStorage.setItem('weddingApp_user', JSON.stringify(userObj));
          localStorage.removeItem('weddingApp_user');
        }
      };

      const handleWelcomeSubmit = async (e) => {
        e.preventDefault();
        setWelcomeError('');
        if (welcomeName.trim()) {
          const name = welcomeName.trim();
          if (usersList.some(u => u && u.name && u.name.toLowerCase() === name.toLowerCase())) {
            setWelcomeError("This name already exists! Please select it from the profiles above.");
            return;
          }
          
          try {
            const isFirstUser = usersList.length === 0;
            const docRef = await window.fs.addDoc(window.fs.collection(window.db, 'users'), { name: name, isAdmin: isFirstUser });
            const newUser = { id: docRef.id, name: name, isAdmin: isFirstUser };
            
            if (isFirstUser) {
               persistUser(newUser);
            } else {
               persistUser(newUser);
            }

          } catch (err) {
            console.error(err);
            setWelcomeError("Cannot connect to Database. Ensure Firestore is set up correctly.");
          }
        }
      };

      const loginAsExisting = (userObj) => {
        if (userObj.isAdmin) {
          setAuthPrompt({ isOpen: true, userObj: userObj, pass: '', error: '' });
        } else {
          persistUser(userObj);
        }
      };

      const handleAdminAuthSubmit = (e) => {
        e.preventDefault();
        if (authPrompt.pass === '619') {
          persistUser(authPrompt.userObj);
          setAuthPrompt({ isOpen: false, userObj: null, pass: '', error: '' });
        } else {
          setAuthPrompt({ ...authPrompt, error: 'Incorrect PIN' });
        }
      };

      // --- Admin / Settings Actions ---
      const toggleAdmin = async (userId, currentStatus) => {
        await window.fs.updateDoc(window.fs.doc(window.db, 'users', userId), { isAdmin: !currentStatus });
      };

      const updateSetting = (key, value) => {
        setSettings(prev => ({ ...prev, [key]: value }));
      };

      const deleteActivity = async (id) => {
        await window.fs.deleteDoc(window.fs.doc(window.db, 'activities', id));
      };

      const clearAllActivities = () => {
        setConfirmDialog({ isOpen: true, type: 'clear_activity', targetId: null, parentId: null, itemTitle: '' });
      };

      // --- Delete Actions (Uses Custom Modal) ---
      const deleteProfile = (userId) => setConfirmDialog({ isOpen: true, type: 'profile', targetId: userId, parentId: null, itemTitle: '' });
      const deleteDay = (id, title) => setConfirmDialog({ isOpen: true, type: 'day', targetId: id, parentId: null, itemTitle: title });
      const deleteEvent = (dayId, eventId, title) => setConfirmDialog({ isOpen: true, type: 'event', targetId: eventId, parentId: dayId, itemTitle: title });

      const executeDelete = async () => {
        try {
          if (confirmDialog.type === 'day') {
            await window.fs.deleteDoc(window.fs.doc(window.db, 'days', confirmDialog.targetId));
            logActivity('deleted_day', `Deleted day "${confirmDialog.itemTitle}"`);
          } else if (confirmDialog.type === 'event') {
            const day = days.find(d => d.id === confirmDialog.parentId);
            const updatedEvents = (day.events||[]).filter(e => e && e.id !== confirmDialog.targetId);
            await window.fs.updateDoc(window.fs.doc(window.db, 'days', confirmDialog.parentId), { events: updatedEvents });
            logActivity('deleted_event', `Deleted event "${confirmDialog.itemTitle}"`);
          } else if (confirmDialog.type === 'profile') {
            await window.fs.deleteDoc(window.fs.doc(window.db, 'users', confirmDialog.targetId));
            if (currentUser?.id === confirmDialog.targetId) {
              localStorage.removeItem('weddingApp_user');
              sessionStorage.removeItem('weddingApp_user');
              setCurrentUser(null);
            }
          } else if (confirmDialog.type === 'clear_activity') {
            for (const act of activities) {
              await window.fs.deleteDoc(window.fs.doc(window.db, 'activities', act.id));
            }
          }
        } catch (err) {
          console.error("Deletion failed", err);
          alert("Action failed. Check your connection or database rules.");
        }
        setConfirmDialog({ isOpen: false, type: '', targetId: null, parentId: null, itemTitle: '' });
      };

      // --- Data Actions ---
      const toggleCollapse = (id) => setCollapsedDays(prev => ({ ...prev, [id]: !prev[id] }));
      const toggleEventCollapse = (id) => setCollapsedEvents(prev => ({ ...prev, [id]: !prev[id] }));

      const openModal = (type, parent = null, editId = null) => {
        setModalType(type);
        setParentId(parent);
        setEditingId(editId);

        if (editId) {
          if (type === 'day') {
            const day = days.find(d => d && d.id === editId);
            if (day) setFormData({ title: day.title, date: day.date || '', color: day.color || PASTEL_COLORS[0].bg, expectedCost: '', actualCost: '', paid: false, vendor: '', notes: '', side: '', paidBy: [] });
          } else {
            const day = days.find(d => d && d.id === parent);
            const ev = day?.events?.find(e => e && e.id === editId);
            if (ev) {
              let initialPayers = [];
              if (ev.paidBy) {
                initialPayers = Array.isArray(ev.paidBy) ? ev.paidBy : ev.paidBy.split(',').map(s => s.trim()).filter(Boolean);
              }
              setFormData({ 
                title: ev.title, expectedCost: toDisplayCost(ev.expectedCost ?? ev.cost), actualCost: toDisplayCost(ev.actualCost),
                paid: ev.paid || false, vendor: ev.vendor || '', notes: ev.notes || '', side: ev.side || '', paidBy: initialPayers,
                color: PASTEL_COLORS[0].bg 
              });
            }
          }
        } else {
          setFormData({ title: '', date: '', expectedCost: '', actualCost: '', paid: false, vendor: '', notes: '', side: '', paidBy: [], color: PASTEL_COLORS[0].bg });
        }
        setIsModalOpen(true);
      };

      const handleSubmit = async (e) => {
        e.preventDefault();
        try {
          if (modalType === 'day') {
            if (editingId) {
              await window.fs.updateDoc(window.fs.doc(window.db, 'days', editingId), { title: formData.title, date: formData.date, color: formData.color });
              logActivity('updated_day', `Updated day details for "${formData.title}"`);
            } else {
              await window.fs.addDoc(window.fs.collection(window.db, 'days'), { title: formData.title, date: formData.date, color: formData.color, events: [], order: days.length });
              logActivity('added_day', `Added a new day: "${formData.title}"`);
            }
          } else if (modalType === 'event') {
            const day = days.find(d => d && d.id === parentId);
            const originalEvent = editingId ? day?.events?.find(e => e && e.id === editingId) : null;
            
            let finalPayers = Array.isArray(formData.paidBy) ? formData.paidBy : [];
            // If checking paid but no payers are selected, default to current user
            if (formData.paid && finalPayers.length === 0) {
              finalPayers = [currentUser.name];
            }

            const newEvent = {
              id: editingId || generateId(),
              title: formData.title,
              expectedCost: toBaseCost(formData.expectedCost),
              actualCost: toBaseCost(formData.actualCost),
              paid: formData.paid,
              vendor: formData.vendor,
              notes: formData.notes,
              side: formData.side,
              loggedBy: editingId ? (originalEvent?.loggedBy || currentUser?.name || '') : (currentUser?.name || ''),
              paidBy: finalPayers
            };

            const updatedEvents = editingId 
              ? (day.events||[]).map(ev => ev && ev.id === editingId ? newEvent : ev) 
              : [...(day.events || []), newEvent];

            await window.fs.updateDoc(window.fs.doc(window.db, 'days', parentId), { events: updatedEvents });
            
            // Log deep diff if editing
            if (editingId) {
              let changes = [];
              if (originalEvent.side !== newEvent.side) changes.push(`changed side from ${originalEvent.side||'None'} to ${newEvent.side}`);
              
              if (originalEvent.expectedCost !== newEvent.expectedCost) changes.push(`expected cost from ${formatMoney(originalEvent.expectedCost)} to ${formatMoney(newEvent.expectedCost)}`);
              if (originalEvent.actualCost !== newEvent.actualCost) changes.push(`actual cost from ${formatMoney(originalEvent.actualCost||0)} to ${formatMoney(newEvent.actualCost)}`);
              
              const origPayers = Array.isArray(originalEvent.paidBy) ? originalEvent.paidBy : [];
              if (JSON.stringify(origPayers) !== JSON.stringify(newEvent.paidBy)) changes.push(`updated payers to [${newEvent.paidBy.join(', ')}]`);
              
              if (originalEvent.title !== newEvent.title) changes.push(`renamed to "${newEvent.title}"`);
              if (originalEvent.paid !== newEvent.paid) changes.push(newEvent.paid ? "marked as paid" : "unmarked as paid");

              const changeString = changes.length > 0 ? changes.join(', ') : 'updated details';
              logActivity('edited_event', `Updated event "${originalEvent.title}": ${changeString}`);
            } else {
              logActivity('added_event', `Added new event "${newEvent.title}" (${formatMoney(newEvent.expectedCost)}) to "${day.title}"`);
            }
            
            setCollapsedEvents(prev => ({ ...prev, [newEvent.id]: false }));
          }
          setIsModalOpen(false);
        } catch (err) {
          console.error(err);
          alert("Error saving. Please check your database rules.");
        }
      };

      const togglePaid = async (dayId, eventId) => {
        const day = days.find(d => d.id === dayId);
        let eventTitle = '';
        let isNowPaid = false;
        let newPayers = [];

        const updatedEvents = (day.events||[]).map(e => {
          if (e && e.id === eventId) {
            eventTitle = e.title;
            isNowPaid = !e.paid;
            let existingPayers = [];
            if (e.paidBy) {
                existingPayers = Array.isArray(e.paidBy) ? e.paidBy : e.paidBy.split(',').map(s => s.trim()).filter(Boolean);
            }
            newPayers = isNowPaid ? (existingPayers.length > 0 ? existingPayers : [currentUser?.name || '']) : [];
            return { ...e, paid: isNowPaid, paidBy: newPayers };
          }
          return e;
        });
        await window.fs.updateDoc(window.fs.doc(window.db, 'days', dayId), { events: updatedEvents });
        logActivity('payment_update', `${isNowPaid ? 'Marked' : 'Unmarked'} event "${eventTitle}" as paid${isNowPaid ? ` by ${newPayers.join(', ')}` : ''}`);
      };

      // Moving Events Up/Down inside a day
      const moveEvent = async (dayId, eventId, direction) => {
        const day = days.find(d => d.id === dayId);
        const idx = (day.events||[]).findIndex(e => e.id === eventId);
        if (idx + direction < 0 || idx + direction >= (day.events||[]).length) return;
        const newEvents = [...day.events];
        [newEvents[idx], newEvents[idx + direction]] = [newEvents[idx + direction], newEvents[idx]];
        await window.fs.updateDoc(window.fs.doc(window.db, 'days', dayId), { events: newEvents });
      };

      // Moving entire Days Up/Down
      const moveDay = async (dayId, direction) => {
        const idx = days.findIndex(d => d.id === dayId);
        if (idx + direction < 0 || idx + direction >= days.length) return;

        const currentDay = days[idx];
        const swapDay = days[idx + direction];

        const currentOrder = currentDay.order ?? idx;
        const swapOrder = swapDay.order ?? (idx + direction);

        try {
          await window.fs.updateDoc(window.fs.doc(window.db, 'days', currentDay.id), { order: swapOrder });
          await window.fs.updateDoc(window.fs.doc(window.db, 'days', swapDay.id), { order: currentOrder });
        } catch (err) {
          console.error("Error moving day", err);
        }
      };

      // --- Formatters ---
      const toDisplayCost = (inrVal) => {
        if (!inrVal && inrVal !== 0) return '';
        return settings.currency === 'CAD' ? (inrVal / settings.exchangeRate).toFixed(2) : inrVal;
      };

      const toBaseCost = (displayVal) => {
        const val = parseFloat(displayVal) || 0;
        return settings.currency === 'CAD' ? val * settings.exchangeRate : val;
      };

      const formatMoney = (amountInr) => {
        const isCAD = settings.currency === 'CAD';
        const converted = isCAD ? (amountInr / settings.exchangeRate) : amountInr;
        return new Intl.NumberFormat('en-IN', { style: 'currency', currency: isCAD ? 'CAD' : 'INR', maximumFractionDigits: isCAD ? 2 : 0 }).format(converted);
      };

      const getInitials = (name) => name ? name.substring(0, 2).toUpperCase() : 'U';

      // --- Loading Screen while waiting for Firebase ---
      if (!firebaseReady) {
        return (
          <div className="flex h-screen items-center justify-center bg-slate-50 dark:bg-slate-900">
            <div className="flex flex-col items-center animate-pulse">
              <IconLogo className="w-12 h-12 text-rose-500 mb-4" />
              <h2 className="text-xl font-bold text-slate-500">Loading Planner...</h2>
            </div>
          </div>
        );
      }

      // --- UI Renders ---
      if (!currentUser) {
        return (
          <div className="flex flex-col h-screen bg-rose-50/50 dark:bg-slate-900 justify-center items-center p-4 sm:p-6 relative overflow-hidden transition-colors duration-300">
            
            {/* Floating Wedding Icons Background */}
            <div className="floating-bg">
              <div className="w-8 h-8"><IconHeart className="w-full h-full" /></div>
              <div className="w-12 h-12"><IconSparkles className="w-full h-full" /></div>
              <div className="w-10 h-10"><IconCake className="w-full h-full" /></div>
              <div className="w-14 h-14"><IconFlower className="w-full h-full" /></div>
              <div className="w-8 h-8"><IconWine className="w-full h-full" /></div>
              <div className="w-12 h-12"><IconGem className="w-full h-full" /></div>
              <div className="w-10 h-10"><IconPartyPopper className="w-full h-full" /></div>
              <div className="w-16 h-16"><IconHeart className="w-full h-full" /></div>
            </div>

            {/* Admin Password Prompt Overlay */}
            {authPrompt.isOpen && (
              <div className="absolute inset-0 bg-slate-900/40 dark:bg-black/60 backdrop-blur-md z-50 flex justify-center items-center p-4 animate-pop-in">
                 <div className="bg-white dark:bg-slate-800 p-8 rounded-[2rem] shadow-2xl max-w-sm w-full text-center">
                    <div className="w-16 h-16 bg-rose-100 dark:bg-rose-500/20 text-rose-500 dark:text-rose-400 rounded-2xl flex items-center justify-center mx-auto mb-6">
                      <IconLock className="w-8 h-8" />
                    </div>
                    <h2 className="text-2xl font-black text-slate-800 dark:text-white mb-2">Admin Access</h2>
                    <p className="text-slate-500 dark:text-slate-400 mb-6 text-sm font-medium">Enter the PIN to access {authPrompt.userObj.name}'s account.</p>
                    
                    <form onSubmit={handleAdminAuthSubmit}>
                      {authPrompt.error && <p className="text-xs text-rose-500 dark:text-rose-400 font-bold mb-3">{authPrompt.error}</p>}
                      <input 
                        type="password" pattern="[0-9]*" inputMode="numeric" required autoFocus
                        value={authPrompt.pass} onChange={(e) => setAuthPrompt({...authPrompt, pass: e.target.value})} 
                        placeholder="•••" 
                        className="w-full bg-slate-50 dark:bg-slate-900 border-2 border-rose-100 dark:border-slate-700 px-5 py-4 rounded-2xl focus:outline-none focus:border-rose-400 dark:focus:border-rose-500 transition-all mb-6 text-center font-black text-2xl tracking-[0.5em] dark:text-white" 
                      />
                      <div className="flex gap-3">
                        <button type="button" onClick={() => setAuthPrompt({ isOpen: false, userObj: null, pass: '', error: '' })} className="flex-1 py-3.5 bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300 font-bold rounded-xl transition-all active:scale-95">Cancel</button>
                        <button type="submit" className="flex-1 py-3.5 bg-rose-500 hover:bg-rose-600 text-white font-bold rounded-xl transition-all shadow-md shadow-rose-200 dark:shadow-none active:scale-95">Unlock</button>
                      </div>
                    </form>
                 </div>
              </div>
            )}

            <div className="bg-white/90 dark:bg-slate-800/90 backdrop-blur-xl p-6 sm:p-8 rounded-[2rem] shadow-2xl max-w-sm w-full border border-white/50 dark:border-slate-700 animate-pop-in text-center z-10 transition-colors duration-300">
              <div className="w-20 h-20 sm:w-24 sm:h-24 bg-gradient-to-br from-rose-400 to-rose-300 dark:from-rose-600 dark:to-rose-500 rounded-full mx-auto flex items-center justify-center text-white shadow-lg mb-6 transform transition-transform hover:scale-110 duration-300">
                <IconLogo className="w-[65px] h-[65px]" />
              </div>
              <h1 className="text-2xl font-black text-slate-800 dark:text-white mb-2">Welcome!</h1>
              <p className="text-slate-500 dark:text-slate-400 mb-6 text-sm font-medium">Let's start planning the big day.</p>

              {usersList.length > 0 && (
                <div className="mb-6 w-full">
                  <h3 className="text-xs font-bold text-slate-400 dark:text-slate-500 uppercase tracking-widest mb-4">Select Profile</h3>
                  <div className="flex flex-wrap justify-center gap-4 max-h-40 overflow-y-auto p-[10px] custom-scrollbar">
                    {usersList.map(user => user && (
                      <button type="button" key={user.id} onClick={() => loginAsExisting(user)} className="flex flex-col items-center gap-2 group transition-transform hover:scale-105 active:scale-95 relative">
                        <div className="w-12 h-12 sm:w-14 sm:h-14 rounded-full bg-indigo-100 dark:bg-indigo-500/20 text-indigo-600 dark:text-indigo-400 font-bold flex items-center justify-center text-lg sm:text-xl shadow-sm border border-indigo-200 dark:border-indigo-500/30 group-hover:ring-4 ring-indigo-100 dark:ring-indigo-900 transition-all">
                          {getInitials(user.name)}
                        </div>
                        {user.isAdmin && (
                          <div className="absolute top-0 right-0 w-4 h-4 sm:w-5 sm:h-5 bg-white dark:bg-slate-800 rounded-full flex items-center justify-center shadow-sm">
                            <IconShield className="w-3 h-3 text-rose-500" />
                          </div>
                        )}
                        <span className="text-xs font-bold text-slate-600 dark:text-slate-300 truncate max-w-[60px]">{user.name}</span>
                      </button>
                    ))}
                  </div>
                  
                  <div className="mt-6 flex items-center gap-3">
                    <div className="flex-1 h-px bg-slate-200 dark:bg-slate-700"></div>
                    <span className="text-[10px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-widest">Or New User</span>
                    <div className="flex-1 h-px bg-slate-200 dark:bg-slate-700"></div>
                  </div>
                </div>
              )}

              <form onSubmit={handleWelcomeSubmit}>
                {welcomeError && <p className="text-xs text-rose-500 dark:text-rose-400 font-bold mb-3">{welcomeError}</p>}
                <input type="text" required value={welcomeName} onChange={(e) => setWelcomeName(e.target.value)} placeholder="Create New Profile" className="w-full bg-slate-50 dark:bg-slate-900 border-2 border-rose-100 dark:border-slate-700 px-5 py-3 sm:py-3.5 rounded-2xl focus:outline-none focus:border-rose-400 dark:focus:border-rose-500 transition-all mb-4 text-center font-bold text-base sm:text-lg dark:text-white" />
                
                <label className="flex items-center justify-center gap-2 mb-5 cursor-pointer text-xs sm:text-sm font-bold text-slate-500 dark:text-slate-400">
                  <input type="checkbox" checked={rememberMe} onChange={(e) => setRememberMe(e.target.checked)} className="w-4 h-4 rounded border-slate-300 text-rose-500 focus:ring-rose-500" />
                  Remember me on this device
                </label>

                <button type="submit" className="w-full bg-rose-500 hover:bg-rose-600 text-white font-bold py-3.5 sm:py-4 rounded-2xl transition-all shadow-md shadow-rose-200 dark:shadow-none active:scale-95 flex justify-center items-center gap-2">
                  Enter Planner <IconHeart className="w-5 h-5" />
                </button>
              </form>
            </div>
          </div>
        );
      }

      return (
        <div className="flex flex-col h-screen bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-100 overflow-hidden transition-colors duration-300">
          
          {/* Header */}
          <header className="bg-white dark:bg-slate-800 px-4 sm:px-5 py-3 sm:py-4 shadow-up dark:shadow-up-dark z-10 flex justify-between items-center shrink-0 border-b border-rose-50 dark:border-slate-700/50 transition-colors duration-300">
            {/* Logo Click to Home (Board) */}
            <div className="flex items-center gap-2 sm:gap-3 cursor-pointer transition-transform active:scale-95" onClick={() => setActiveTab('board')}>
              <IconLogo className="w-10 h-10 text-slate-800 dark:text-slate-100" />
              <h1 className="text-xl sm:text-2xl font-black tracking-tight text-slate-800 dark:text-slate-100">
                Wedding Planner
              </h1>
            </div>

            <div className="flex items-center gap-2 bg-slate-50 dark:bg-slate-700/50 border border-slate-100 dark:border-slate-600 pr-2 sm:pr-3 pl-1 py-1 rounded-full cursor-pointer hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors active:scale-95" onClick={() => setActiveTab('settings')}>
              <div className="w-7 h-7 sm:w-8 sm:h-8 rounded-full bg-indigo-100 dark:bg-indigo-500/20 text-indigo-600 dark:text-indigo-400 font-bold flex items-center justify-center text-xs relative">
                {getInitials(currentUser.name)}
                {currentUser.isAdmin && <IconShield className="w-3 h-3 sm:w-3.5 sm:h-3.5 absolute -bottom-1 -right-1 text-rose-500 bg-white dark:bg-slate-800 rounded-full" />}
              </div>
              <span className="text-xs sm:text-sm font-bold text-slate-600 dark:text-slate-300 hidden sm:inline-block max-w-[100px] truncate">{currentUser.name}</span>
            </div>
          </header>

          {/* Main Content */}
          <main className="flex-1 overflow-y-auto p-3 sm:p-6 pb-28 relative">
            <div className="max-w-7xl mx-auto">

              {/* TAB: ACTIVITY */}
              {activeTab === 'activity' && (
                <div className="max-w-2xl mx-auto space-y-6 animate-pop-in">
                  <div className="flex justify-between items-center">
                    <h2 className="text-2xl sm:text-3xl font-black tracking-tight text-slate-800 dark:text-white flex items-center gap-2">
                      <IconActivity className="w-6 h-6 sm:w-7 sm:h-7 text-indigo-400" /> Activity Log
                    </h2>
                    {currentUser?.isAdmin && activities.length > 0 && (
                      <button onClick={clearAllActivities} className="text-xs sm:text-sm font-bold text-rose-500 bg-rose-50 dark:bg-rose-500/10 px-3 py-1.5 sm:px-4 sm:py-2 rounded-lg transition-colors hover:bg-rose-100 dark:hover:bg-rose-500/20">
                        Clear All
                      </button>
                    )}
                  </div>

                  <div className="bg-white dark:bg-slate-800 p-4 sm:p-6 rounded-[1.5rem] sm:rounded-[2rem] shadow-sm border border-slate-100 dark:border-slate-700 transition-colors duration-300">
                    {activities.length === 0 ? (
                      <div className="text-center py-10 text-slate-400 italic text-sm">No activity recorded yet. Start planning!</div>
                    ) : (
                      <div className="space-y-4">
                        {activities.map((act) => (
                          <div key={act.id} className="flex items-start gap-3 sm:gap-4 p-3 bg-slate-50 dark:bg-slate-700/30 rounded-xl sm:rounded-2xl border border-slate-100 dark:border-slate-700">
                            <div className="w-8 h-8 sm:w-10 sm:h-10 rounded-full bg-indigo-100 dark:bg-indigo-500/20 text-indigo-600 dark:text-indigo-400 font-bold flex items-center justify-center text-xs sm:text-sm shrink-0">
                              {getInitials(act.userName)}
                            </div>
                            <div className="flex-1 min-w-0">
                              <div className="text-sm sm:text-base text-slate-700 dark:text-slate-200">
                                <span className="font-bold">{act.userName}</span> {act.details}
                              </div>
                              <div className="text-[10px] sm:text-xs text-slate-400 dark:text-slate-500 mt-1 font-semibold">
                                {formatTimeAgo(act.timestamp)}
                              </div>
                            </div>
                            {currentUser?.isAdmin && (
                              <button onClick={() => deleteActivity(act.id)} className="p-1.5 text-slate-400 hover:text-rose-500 hover:bg-white dark:hover:bg-slate-800 rounded-lg transition-colors">
                                <IconTrash className="w-4 h-4" />
                              </button>
                            )}
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                </div>
              )}

              {/* TAB: SETTINGS */}
              {activeTab === 'settings' && (
                <div className="max-w-xl mx-auto space-y-6 animate-pop-in">
                  <h2 className="text-2xl sm:text-3xl font-black tracking-tight text-slate-800 dark:text-white flex items-center gap-2">
                    <IconSettings className="w-6 h-6 sm:w-7 sm:h-7 text-slate-400 dark:text-slate-500" /> App Settings
                  </h2>

                  <div className="bg-white dark:bg-slate-800 p-4 sm:p-6 rounded-[1.5rem] sm:rounded-[2rem] shadow-sm border border-slate-100 dark:border-slate-700 space-y-6 transition-colors duration-300">
                    
                    {/* Theme Toggle */}
                    <div>
                      <h3 className="font-bold text-base sm:text-lg text-slate-800 dark:text-white flex items-center gap-2 mb-3"><IconSun className="w-4 h-4 sm:w-5 sm:h-5 text-amber-500" /> Theme</h3>
                      <div className="flex bg-slate-100 dark:bg-slate-900 p-1.5 rounded-xl border border-slate-200 dark:border-slate-700">
                        <button onClick={() => updateSetting('theme', 'light')} className={`flex-1 flex items-center justify-center gap-2 py-2 sm:py-2.5 text-xs sm:text-sm font-bold rounded-lg transition-all active:scale-95 ${settings.theme !== 'dark' ? 'bg-white dark:bg-slate-700 shadow-sm text-slate-800 dark:text-white' : 'text-slate-500 dark:text-slate-400 hover:text-slate-700 dark:hover:text-slate-200'}`}>
                          <IconSun className="w-4 h-4"/> Light
                        </button>
                        <button onClick={() => updateSetting('theme', 'dark')} className={`flex-1 flex items-center justify-center gap-2 py-2 sm:py-2.5 text-xs sm:text-sm font-bold rounded-lg transition-all active:scale-95 ${settings.theme === 'dark' ? 'bg-white dark:bg-slate-700 shadow-sm text-slate-800 dark:text-white' : 'text-slate-500 dark:text-slate-400 hover:text-slate-700 dark:hover:text-slate-200'}`}>
                          <IconMoon className="w-4 h-4"/> Dark
                        </button>
                      </div>
                    </div>

                    {/* Layout Size Toggle */}
                    <div className="mt-6">
                      <h3 className="font-bold text-base sm:text-lg text-slate-800 dark:text-white flex items-center gap-2 mb-3">
                        <IconLayout className="w-4 h-4 sm:w-5 sm:h-5 text-indigo-500" /> Layout Size
                      </h3>
                      <div className="flex bg-slate-100 dark:bg-slate-900 p-1.5 rounded-xl border border-slate-200 dark:border-slate-700">
                        {['small', 'medium', 'large'].map(size => (
                          <button key={size} onClick={() => updateSetting('layoutSize', size)} className={`flex-1 capitalize py-2 sm:py-2.5 text-xs sm:text-sm font-bold rounded-lg transition-all active:scale-95 ${settings.layoutSize === size || (!settings.layoutSize && size === 'small') ? 'bg-white dark:bg-slate-700 shadow-sm text-slate-800 dark:text-white' : 'text-slate-500 dark:text-slate-400 hover:text-slate-700 dark:hover:text-slate-200'}`}>
                            {size}
                          </button>
                        ))}
                      </div>
                    </div>

                    <hr className="border-slate-100 dark:border-slate-700" />

                    {/* Current User */}
                    <div>
                      <h3 className="font-bold text-base sm:text-lg text-slate-800 dark:text-white flex items-center gap-2 mb-3"><IconUser className="w-4 h-4 sm:w-5 sm:h-5 text-indigo-400" /> Profile</h3>
                      <div className="flex items-center justify-between bg-slate-50 dark:bg-slate-700/50 p-3 sm:p-4 rounded-xl sm:rounded-2xl border border-slate-100 dark:border-slate-700">
                        <div className="flex items-center gap-3 sm:gap-4">
                          <div className="w-12 h-12 sm:w-16 h-16 rounded-full bg-gradient-to-tr from-indigo-200 to-indigo-100 dark:from-indigo-600 dark:to-indigo-500 text-indigo-600 dark:text-white font-bold flex items-center justify-center text-xl sm:text-2xl shadow-sm relative">
                            {getInitials(currentUser.name)}
                            {currentUser.isAdmin && <div className="absolute -bottom-1 -right-1 bg-slate-50 dark:bg-slate-800 rounded-full p-1 shadow-sm"><IconShield className="w-4 h-4 sm:w-5 sm:h-5 text-rose-500" /></div>}
                          </div>
                          <div>
                            <div className="text-xs sm:text-sm text-slate-500 dark:text-slate-400 font-medium mb-0.5 sm:mb-1">Current User</div>
                            <div className="text-lg sm:text-xl font-black tracking-tight text-slate-800 dark:text-white">{currentUser.name}</div>
                          </div>
                        </div>
                        <button onClick={() => { localStorage.removeItem('weddingApp_user'); sessionStorage.removeItem('weddingApp_user'); setCurrentUser(null); }} className="text-xs sm:text-sm text-rose-500 dark:text-rose-400 font-bold bg-rose-50 dark:bg-rose-500/10 hover:bg-rose-100 dark:hover:bg-rose-500/20 transition-colors px-3 py-1.5 sm:px-4 sm:py-2 rounded-lg sm:rounded-xl">Logout</button>
                      </div>
                    </div>

                    {/* Admin Dashboard */}
                    {currentUser?.isAdmin && (
                      <div className="pt-2">
                        <h3 className="font-bold text-base sm:text-lg text-rose-600 dark:text-rose-400 mb-3 flex items-center gap-2">
                          <IconShield className="w-4 h-4 sm:w-5 sm:h-5" /> Admin: User Management
                        </h3>
                        <div className="space-y-1.5 sm:space-y-2 border border-slate-100 dark:border-slate-700 rounded-xl sm:rounded-2xl overflow-hidden">
                          {usersList.map(user => user && (
                            <div key={user.id} className="flex justify-between items-center p-3 sm:p-4 bg-slate-50 dark:bg-slate-700/30 border-b border-slate-100 dark:border-slate-700 last:border-0 transition-colors">
                              <span className="font-bold text-sm sm:text-base text-slate-700 dark:text-slate-200 flex items-center gap-2">
                                {user.name} {user.isAdmin && <span className="text-[9px] sm:text-[10px] bg-rose-100 dark:bg-rose-500/20 text-rose-600 dark:text-rose-400 px-2 py-0.5 rounded-full font-bold">ADMIN</span>}
                              </span>
                              <div className="flex gap-1.5 sm:gap-2">
                                {user.id !== currentUser.id && (
                                  <>
                                    <button onClick={() => toggleAdmin(user.id, user.isAdmin)} className={`text-[10px] sm:text-xs px-2 sm:px-3 py-1 sm:py-1.5 rounded-md sm:rounded-lg font-bold transition-colors ${user.isAdmin ? 'bg-slate-200 dark:bg-slate-600 text-slate-600 dark:text-slate-300' : 'bg-emerald-100 dark:bg-emerald-500/20 text-emerald-700 dark:text-emerald-400'}`}>
                                      {user.isAdmin ? 'Remove Admin' : 'Make Admin'}
                                    </button>
                                    <button onClick={() => deleteProfile(user.id)} className="p-1 sm:p-1.5 text-rose-500 bg-rose-100 dark:bg-rose-500/20 rounded-md sm:rounded-lg hover:bg-rose-200 dark:hover:bg-rose-500/30 transition-colors">
                                      <IconTrash className="w-3.5 h-3.5 sm:w-4 sm:h-4"/>
                                    </button>
                                  </>
                                )}
                              </div>
                            </div>
                          ))}
                        </div>
                      </div>
                    )}

                    {/* Active Users List (For non-admins) */}
                    {!currentUser?.isAdmin && usersList.length > 0 && (
                      <div className="pt-2">
                        <h3 className="font-bold text-xs sm:text-sm text-slate-500 dark:text-slate-400 uppercase tracking-widest mb-3 flex items-center gap-2">
                          <IconUsers className="w-4 h-4" /> Saved Profiles
                        </h3>
                        <div className="grid grid-cols-2 sm:grid-cols-3 gap-2 sm:gap-3">
                          {usersList.map(user => user && (
                            <div key={user.id} className="flex items-center gap-2 sm:gap-3 bg-slate-50 dark:bg-slate-700/30 p-2 sm:p-3 rounded-xl sm:rounded-2xl border border-slate-100 dark:border-slate-700 relative">
                              <div className="w-8 h-8 sm:w-10 sm:h-10 rounded-full bg-indigo-100 dark:bg-indigo-500/20 text-indigo-600 dark:text-indigo-400 font-bold flex items-center justify-center text-xs sm:text-sm shrink-0">
                                {getInitials(user.name)}
                              </div>
                              <div className="font-bold text-xs sm:text-sm text-slate-700 dark:text-slate-300 truncate pr-3 sm:pr-4">{user.name}</div>
                              {user.isAdmin && <IconShield className="w-3 h-3 sm:w-4 sm:h-4 text-rose-500 absolute top-1.5 right-1.5 sm:top-2 sm:right-2" />}
                            </div>
                          ))}
                        </div>
                      </div>
                    )}

                    <hr className="border-slate-100 dark:border-slate-700" />

                    <div>
                      <h3 className="font-bold text-base sm:text-lg text-slate-800 dark:text-white flex items-center gap-2 mb-3">Currency Conversion</h3>
                      <div className="space-y-4">
                        <div>
                          <label className="block text-xs sm:text-sm font-semibold text-slate-600 dark:text-slate-400 mb-1.5 sm:mb-2">Display Currency</label>
                          <div className="flex bg-slate-100 dark:bg-slate-900 p-1 sm:p-1.5 rounded-lg sm:rounded-xl border border-slate-200 dark:border-slate-700">
                            {['INR', 'CAD'].map(curr => (
                              <button key={curr} onClick={() => updateSetting('currency', curr)} className={`flex-1 py-2 sm:py-2.5 text-xs sm:text-sm font-bold rounded-md sm:rounded-lg transition-all active:scale-95 ${settings.currency === curr ? 'bg-white dark:bg-slate-700 shadow-sm text-slate-800 dark:text-white' : 'text-slate-500 dark:text-slate-400 hover:text-slate-700 dark:hover:text-slate-200'}`}>
                                {curr}
                              </button>
                            ))}
                          </div>
                        </div>
                        <div>
                          <label className="block text-xs sm:text-sm font-semibold text-slate-600 dark:text-slate-400 mb-1.5 sm:mb-2">Conversion Rate</label>
                          <div className="flex items-center gap-2 sm:gap-3">
                            <span className="text-xs sm:text-sm font-bold text-slate-400 dark:text-slate-500">1 CAD =</span>
                            <div className="relative flex-1">
                              <span className="absolute left-3 sm:left-4 top-1/2 -translate-y-1/2 font-bold text-slate-400">₹</span>
                              <input type="number" step="0.1" value={settings.exchangeRate} onChange={(e) => updateSetting('exchangeRate', parseFloat(e.target.value) || 68)} className="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 pl-7 sm:pl-8 pr-3 sm:pr-4 py-2 sm:py-3 rounded-lg sm:rounded-xl focus:outline-none focus:border-indigo-300 dark:focus:border-indigo-500 font-bold text-sm sm:text-base text-slate-700 dark:text-slate-200" />
                            </div>
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              )}

              {/* TAB: DASHBOARD */}
              {activeTab === 'dashboard' && (
                <div className="space-y-6 sm:space-y-8 animate-pop-in">
                  <div className="flex justify-between items-center">
                    <h2 className="text-2xl sm:text-3xl font-black tracking-tight text-slate-800 dark:text-white">Budget Overview</h2>
                  </div>

                  <div className="grid grid-cols-2 lg:grid-cols-4 gap-3 sm:gap-4">
                    <div className="bg-white dark:bg-slate-800 p-4 sm:p-6 rounded-2xl sm:rounded-[2rem] shadow-sm border border-slate-100 dark:border-slate-700 transition-colors duration-300">
                      <div className="text-slate-500 dark:text-slate-400 mb-0.5 sm:mb-1 font-bold text-[10px] sm:text-sm uppercase tracking-wider">Total Planned</div>
                      <div className="text-xl sm:text-3xl font-black text-slate-800 dark:text-white truncate">{formatMoney(stats.totalExpected)}</div>
                    </div>
                    <div className="bg-white dark:bg-slate-800 p-4 sm:p-6 rounded-2xl sm:rounded-[2rem] shadow-sm border border-slate-100 dark:border-slate-700 transition-colors duration-300">
                      <div className="text-slate-500 dark:text-slate-400 mb-0.5 sm:mb-1 font-bold text-[10px] sm:text-sm uppercase tracking-wider">Total Actual</div>
                      <div className={`text-xl sm:text-3xl font-black truncate ${getCostColorClass(stats.totalActual, stats.totalExpected)}`}>{formatMoney(stats.totalActual)}</div>
                    </div>
                    <div className="bg-emerald-50/50 dark:bg-emerald-500/10 p-4 sm:p-6 rounded-2xl sm:rounded-[2rem] shadow-sm border border-emerald-100 dark:border-emerald-500/20 transition-colors duration-300">
                      <div className="text-emerald-600 dark:text-emerald-400 mb-0.5 sm:mb-1 font-bold text-[10px] sm:text-sm uppercase tracking-wider">Amount Paid</div>
                      <div className="text-xl sm:text-3xl font-black text-emerald-700 dark:text-emerald-300 truncate">{formatMoney(stats.paid)}</div>
                    </div>
                    <div className="bg-rose-50/50 dark:bg-rose-500/10 p-4 sm:p-6 rounded-2xl sm:rounded-[2rem] shadow-sm border border-rose-100 dark:border-rose-500/20 transition-colors duration-300">
                      <div className="text-rose-600 dark:text-rose-400 mb-0.5 sm:mb-1 font-bold text-[10px] sm:text-sm uppercase tracking-wider">Remaining</div>
                      <div className="text-xl sm:text-3xl font-black text-rose-700 dark:text-rose-300 truncate">{formatMoney(stats.remaining)}</div>
                    </div>
                  </div>

                  <div className="bg-white dark:bg-slate-800 p-4 sm:p-6 rounded-2xl sm:rounded-[2rem] shadow-sm border border-slate-100 dark:border-slate-700 relative overflow-hidden transition-colors duration-300">
                    <div className="flex justify-between text-xs sm:text-sm mb-2 sm:mb-3 font-bold">
                      <span className="text-emerald-500 dark:text-emerald-400 flex items-center gap-1.5"><IconCheck className="w-3.5 h-3.5 sm:w-4 sm:h-4"/> Paid: {stats.totalExpected ? Math.round((stats.paid/stats.totalExpected)*100) : 0}%</span>
                      <span className="text-slate-400 dark:text-slate-500">Goal: {formatMoney(stats.totalExpected)}</span>
                    </div>
                    <div className="w-full bg-slate-100 dark:bg-slate-700 rounded-full h-3 sm:h-5 overflow-hidden flex shadow-inner">
                      <div className="bg-gradient-to-r from-emerald-400 to-emerald-500 dark:from-emerald-500 dark:to-emerald-400 h-full transition-all duration-1000 ease-out relative" style={{ width: `${stats.totalExpected ? (stats.paid/stats.totalExpected)*100 : 0}%` }}>
                        <div className="absolute inset-0 bg-white/20 w-full shimmer"></div>
                      </div>
                    </div>
                  </div>

                  <div className="bg-white dark:bg-slate-800 p-4 sm:p-6 rounded-2xl sm:rounded-[2rem] shadow-sm border border-slate-100 dark:border-slate-700 transition-colors duration-300">
                    <h3 className="text-lg sm:text-xl font-black text-slate-800 dark:text-white mb-4 sm:mb-6">Contributions</h3>
                    {Object.keys(stats.contributions).length === 0 ? (
                      <div className="text-center text-slate-400 py-4 sm:py-6 italic text-xs sm:text-sm font-medium">No payments recorded yet.</div>
                    ) : (
                      <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-3 sm:gap-4">
                        {Object.entries(stats.contributions).sort(([,a], [,b]) => b - a).map(([person, amount]) => (
                          <div key={person} className="flex items-center p-3 sm:p-4 bg-slate-50 dark:bg-slate-700/50 border border-slate-100 dark:border-slate-700 rounded-xl sm:rounded-2xl gap-3 sm:gap-4 transition-shadow">
                            <div className="w-10 h-10 sm:w-12 sm:h-12 bg-orange-100 dark:bg-orange-500/20 text-orange-600 dark:text-orange-400 rounded-full flex items-center justify-center font-bold text-base sm:text-lg shrink-0">
                              {getInitials(person)}
                            </div>
                            <div>
                              <div className="text-slate-500 dark:text-slate-400 text-[10px] sm:text-xs font-bold uppercase tracking-widest">{person}</div>
                              <div className="text-base sm:text-lg font-black tracking-tight text-slate-800 dark:text-white">{formatMoney(amount)}</div>
                            </div>
                          </div>
                        ))}
                      </div>
                    )}
                  </div>

                  <h3 className="text-xl sm:text-2xl font-black tracking-tight text-slate-800 dark:text-white pt-2">Breakdown by Side</h3>
                  <div className="grid grid-cols-1 md:grid-cols-3 gap-4 sm:gap-5">
                    
                    <div className="bg-rose-50/40 dark:bg-rose-500/10 p-4 sm:p-6 rounded-2xl sm:rounded-[2rem] shadow-sm border border-rose-100 dark:border-rose-500/20 transition-colors duration-300">

                                              <IconEdit className="w-3.5 h-3.5 sm:w-4 sm:h-4" />
                                            </button>
                                            {currentUser?.isAdmin && (
                                              <button onClick={() => deleteEvent(day.id, ev.id, ev.title)} className="p-1.5 sm:p-2 text-slate-400 dark:text-slate-500 hover:text-rose-500 dark:hover:text-rose-400 hover:bg-white dark:hover:bg-slate-800 hover:shadow-sm rounded-md sm:rounded-lg transition-all active:scale-90">
                                                <IconTrash className="w-3.5 h-3.5 sm:w-4 sm:h-4" />
                                              </button>
                                            )}
                                          </div>
                                        </div>
                                      </div>

            </div>
